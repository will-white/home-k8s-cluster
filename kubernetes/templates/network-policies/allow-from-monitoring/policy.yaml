---
# Allow ingress from Prometheus and kube-state-metrics in the
# observability namespace, so ServiceMonitors keep scraping after the
# default-deny is applied.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-monitoring
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
