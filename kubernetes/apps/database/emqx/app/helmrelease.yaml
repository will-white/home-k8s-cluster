apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: emqx
spec:
  interval: 30m
  chart:
    spec:
      chart: emqx-operator
      # Pin to 2.2.29: operator 2.3.0+ polls EMQX 5.9+ /api/v5/load_rebalance/global_status
      # which 404s on OSS EMQX 5.8.9 (the last open-source release; 5.9+ is
      # Enterprise-only and refuses to run >1 node without a license). With
      # 2.3.x the reconcile aborts before the readiness-gate step, leaving new
      # core pods stuck on apps.emqx.io/on-serving (0/1 forever) -> emqx-listeners
      # Service has no ready endpoints -> all MQTT clients get ECONNREFUSED.
      # DO NOT bump without verifying the operator no longer calls the enterprise
      # load_rebalance API against OSS EMQX (renovate: this is intentionally held back).
      version: 2.3.2
      sourceRef:
        kind: HelmRepository
        name: emqx
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: cert-manager
      namespace: cert-manager
  values:
    fullnameOverride: emqx-operator
    image:
      repository: ghcr.io/emqx/emqx-operator
  driftDetection:
    mode: enabled
