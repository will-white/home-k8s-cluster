apiVersion: apps.emqx.io/v2beta1
kind: EMQX
metadata:
  name: emqx
spec:
  # OSS 5.8.9 is the last open-source EMQX release; 5.9+ is Enterprise-only
  # and refuses to start in a >1-node cluster without a license. Operator
  # is pinned to 2.2.29 (see helmrelease.yaml) which still supports v2beta1.
  image: public.ecr.aws/emqx/emqx:5.8.9
  config:
    data: |
      authentication {
        backend = "built_in_database"
        mechanism = "password_based"
        password_hash_algorithm {
            name = "bcrypt"
        }
        user_id_type = "username"
        bootstrap_file = "/opt/init-user.json"
        bootstrap_type = "plain"
      }
      authorization {
        sources = [
          {
            type = built_in_database
            enable = true
          }
        ]
        # Authenticated clients are trusted to pub/sub on this LAN-only broker.
        # The security boundary is authentication (per-user passwords); the
        # built_in_database ACL has no bootstrap source in Git, so any rules
        # only ever lived in the broker's mnesia volume (emptyDir) and are lost
        # on a full broker rebuild. Keep "allow" so the bootstrap users
        # (hass/frigate/z2m) — which are is_superuser:false — can operate
        # without depending on un-versioned, manually-curated ACL entries.
        no_match: "allow"
      }
      mqtt {
        # zigbee2mqtt publishes large retained payloads on connect
        # (bridge/devices + bridge/definitions for all devices, with
        # mqtt.include_device_information enabled). With 40+ devices these
        # exceed EMQX's 1MB default, causing frame_too_large shutdowns the
        # client sees as "write ECONNRESET", which blocks z2m startup. Raise
        # the limit so the full device manifest fits.
        max_packet_size = "10MB"
      }
  coreTemplate:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      replicas: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              apps.emqx.io/instance: emqx
              apps.emqx.io/db-role: core
      envFrom:
        - secretRef:
            name: emqx-secret
      extraVolumeMounts:
        - name: init-user
          mountPath: /opt/init-user.json
          subPath: init-user.json
          readOnly: true
      extraVolumes:
        - name: init-user
          secret:
            secretName: emqx-init-user-secret
  listenersServiceTemplate:
    metadata:
      annotations:
        external-dns.alpha.kubernetes.io/hostname: mqtt.${SECRET_DOMAIN}
        lbipam.cilium.io/ips: ${EMQX_LB}
    spec:
      type: LoadBalancer
