apiVersion: apps.emqx.io/v2
kind: EMQX
metadata:
  name: emqx
spec:
  # OSS 5.8.9 is the last open-source EMQX release; 5.9+ is Enterprise-only
  # and refuses to start in a >1-node cluster without a license. Operator
  # 2.3.0 reconcile loop will log 404s on /api/v5/load_rebalance/global_status
  # (a 5.9+ endpoint) — known and accepted; existing pods keep working.
  image: public.ecr.aws/emqx/emqx:5.8.9
  config:
    data: |
      authentication {
        backend = "built_in_database"
        mechanism = "password_based"
        password_hash_algorithm {
            name = "bcrypt"
        }
        user_id_type = "username"
        bootstrap_file = "/opt/init-user.json"
        bootstrap_type = "plain"
      }
      authorization {
        sources = [
          {
            type = built_in_database
            enable = true
          }
        ]
        no_match: "deny"
      }
  coreTemplate:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      replicas: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              apps.emqx.io/instance: emqx
              apps.emqx.io/db-role: core
      envFrom:
        - secretRef:
            name: emqx-secret
      extraVolumeMounts:
        - name: init-user
          mountPath: /opt/init-user.json
          subPath: init-user.json
          readOnly: true
      extraVolumes:
        - name: init-user
          secret:
            secretName: emqx-init-user-secret
  listenersServiceTemplate:
    metadata:
      annotations:
        external-dns.alpha.kubernetes.io/hostname: mqtt.${SECRET_DOMAIN}
        lbipam.cilium.io/ips: ${EMQX_LB}
    spec:
      type: LoadBalancer
