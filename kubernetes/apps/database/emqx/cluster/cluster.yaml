apiVersion: apps.emqx.io/v2beta1
kind: EMQX
metadata:
  name: emqx
spec:
  # Step 1 of operator 2.3.0 upgrade path: broker on 5.10.x with durable
  # sessions disabled (no PVC on coreTemplate, so DS would write to
  # ephemeral storage). Operator stays on 2.2.29 + apps.emqx.io/v2beta1
  # for this step. Revisit once cluster.yaml is migrated to v2 and the
  # operator chart is restored to 2.3.0.
  image: public.ecr.aws/emqx/emqx:5.10.3
  config:
    data: |
      durable_sessions {
        enable = false
      }
      authentication {
        backend = "built_in_database"
        mechanism = "password_based"
        password_hash_algorithm {
            name = "bcrypt"
        }
        user_id_type = "username"
        bootstrap_file = "/opt/init-user.json"
        bootstrap_type = "plain"
      }
      authorization {
        sources = [
          {
            type = built_in_database
            enable = true
          }
        ]
        no_match: "deny"
      }
  coreTemplate:
    metadata:
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      replicas: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              apps.emqx.io/instance: emqx
              apps.emqx.io/db-role: core
      envFrom:
        - secretRef:
            name: emqx-secret
      extraVolumeMounts:
        - name: init-user
          mountPath: /opt/init-user.json
          subPath: init-user.json
          readOnly: true
      extraVolumes:
        - name: init-user
          secret:
            secretName: emqx-init-user-secret
  listenersServiceTemplate:
    metadata:
      annotations:
        external-dns.alpha.kubernetes.io/hostname: mqtt.${SECRET_DOMAIN}
        lbipam.cilium.io/ips: ${EMQX_LB}
    spec:
      type: LoadBalancer
