---
# The dragonfly-operator (v1.6+) auto-generates a NetworkPolicy that only
# permits ingress to the Dragonfly pods on 6379 from within the database
# namespace (its `from` uses an empty podSelector with no namespaceSelector).
# paperless (default namespace) uses dragonfly.database.svc:6379 as its Redis
# cache and was blocked by that policy. NetworkPolicies are additive, so this
# supplemental policy restores the cross-namespace access without fighting the
# operator-managed `dragonfly` policy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-from-default
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: dragonfly
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
      ports:
        - port: 6379
          protocol: TCP
