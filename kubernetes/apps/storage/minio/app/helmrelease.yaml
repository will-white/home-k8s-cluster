apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: minio
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.1.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      minio:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: quay.io/minio/minio
              tag: RELEASE.2024-05-10T01-41-38Z@sha256:420663b8685c5396f06405ad516d611db4465939a141cc7d40266342d0f2632d
            env:
              - name: MINIO_API_CORS_ALLOW_ORIGIN
                value: https://minio.${SECRET_DOMAIN},https://s3.${SECRET_DOMAIN}
              - name: MINIO_BROWSER_REDIRECT_URL
                value: https://minio.${SECRET_DOMAIN}
              - name: MINIO_PROMETHEUS_JOB_ID
                value: minio
              - name: MINIO_PROMETHEUS_URL
                value: https://prometheus.${SECRET_DOMAIN}
              - name: MINIO_PROMETHEUS_AUTH_TYPE
                value: public
              - name: MINIO_SERVER_URL
                value: https://s3.${SECRET_DOMAIN}
              - name: MINIO_UPDATE
                value: off
              - name: TZ
                value: ${TIME_ZONE}
              - name: MINIO_ROOT_USER
                value: ROOTUSER
                # valueFrom:
                #   secretKeyRef:
                #     name: minio-credentials
                #     key: username
              - name: MINIO_ROOT_PASSWORD
                value: CHANGEME123
                # valueFrom:
                #   secretKeyRef:
                #     name: minio-credentials
                #     key: password
            args: ["server", "/data", "--console-address", ":9001"]
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /minio/health/live
                    port: 9000
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 10
                  failureThreshold: 6
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 568
        runAsGroup: 568
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
        supplementalGroups: [10000]
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        controller: minio
        ports:
          http:
            port: 9001
          s3:
            port: 9000
    serviceMonitor:
      app:
        serviceName: minio
        endpoints:
          - port: s3
            scheme: http
            path: /minio/v2/metrics/cluster
            interval: 1m
            scrapeTimeout: 10s
    ingress:
      app:
        className: internal
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
          - host: s3.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: s3
    persistence:
      # config:
      #   type: hostPath
      #   hostPath: /eros/Minio
      #   hostPathType: Directory
      #   globalMounts:
      #     - path: /data
      data:
        enabled: true
        type: nfs
        server: "${SECRET_NFS_SERVER}"
        path: "${SECRET_NFS_MINIO}"
        globalMounts:
          - path: /data
