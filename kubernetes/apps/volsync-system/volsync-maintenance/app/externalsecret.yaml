---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Dedicated repository secret for the shared volsync-backups Kopia maintenance.
# Mirrors the format produced by kubernetes/templates/volsync/minio.yaml so the
# KopiaMaintenance controller can connect using the same credentials all
# ReplicationSources use.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-backups-maintenance
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: volsync-backups-maintenance
    template:
      data:
        KOPIA_PASSWORD: "{{ .password }}"
        KOPIA_REPOSITORY: "s3://volsync-backups"
        AWS_ACCESS_KEY_ID: "{{ .accessKey }}"
        AWS_SECRET_ACCESS_KEY: "{{ .secretKey }}"
        AWS_S3_ENDPOINT: "http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc"
        KOPIA_S3_DISABLE_TLS: "true"
      engineVersion: v2
  data:
    - secretKey: password
      remoteRef:
        key: kopia-restic-password
    - secretKey: accessKey
      remoteRef:
        key: volsync-bucket-key
    - secretKey: secretKey
      remoteRef:
        key: volsync-bucket-secret
