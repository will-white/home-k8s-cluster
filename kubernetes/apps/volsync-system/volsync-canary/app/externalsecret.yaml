---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
# Reuses the same shared `volsync-backups` Kopia repo credentials that every
# ReplicationSource and the maintenance job use. The canary connects in
# read-only mode to enumerate snapshots — it never writes.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-canary
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: volsync-canary
    template:
      data:
        KOPIA_PASSWORD: "{{ .password }}"
        KOPIA_REPOSITORY: "s3://volsync-backups"
        AWS_ACCESS_KEY_ID: "{{ .accessKey }}"
        AWS_SECRET_ACCESS_KEY: "{{ .secretKey }}"
        AWS_S3_ENDPOINT: "http://rook-ceph-rgw-ceph-objectstore.rook-ceph.svc"
        KOPIA_S3_DISABLE_TLS: "true"
      engineVersion: v2
  data:
    - secretKey: password
      remoteRef:
        key: kopia-restic-password
    - secretKey: accessKey
      remoteRef:
        key: volsync-bucket-key
    - secretKey: secretKey
      remoteRef:
        key: volsync-bucket-secret
