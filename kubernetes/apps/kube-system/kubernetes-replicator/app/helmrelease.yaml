apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubernetes-replicator
spec:
  interval: 30m
  chart:
    spec:
      chart: kubernetes-replicator
      version: 2.10.1
      sourceRef:
        kind: HelmRepository
        name: mittwald
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
