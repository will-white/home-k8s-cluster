apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app smartctl-exporter
spec:
  interval: 30m
  chart:
    spec:
      chart: prometheus-smartctl-exporter
      version: 0.16.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: kube-prometheus-stack
      namespace: observability
  values:
    fullnameOverride: *app
    # Auto-discover devices via `smartctl --scan`. The previous explicit
    # device list (`/dev/sda;sat`, `/dev/nvme0n1`) returned HTTP 500 on nodes
    # that do not have a SATA disk, which fired persistent TargetDown alerts.
    serviceMonitor:
      enabled: true
    prometheusRules:
      enabled: false
  driftDetection:
    mode: enabled
