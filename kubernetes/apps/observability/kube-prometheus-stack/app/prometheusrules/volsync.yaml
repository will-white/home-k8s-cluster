---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: volsync-rules
  labels:
    prometheus: kube-prometheus-stack
    role: alert-rules
spec:
  groups:
    - name: volsync.rules
      rules:
        - alert: VolsyncReplicationSourceMissedSchedule
          annotations:
            summary: >-
              ReplicationSource {{ $labels.obj_namespace }}/{{ $labels.obj_name }}
              missed its scheduled sync interval.
            description: >-
              Volsync recorded one or more missed sync intervals for the
              ReplicationSource {{ $labels.obj_namespace }}/{{ $labels.obj_name }}
              in the last hour. Inspect the mover pod logs and the source's
              `.status.lastSyncTime`. Bootstrap (one-time restore) destinations
              are excluded by the `role="source"` filter.
            runbook_url: https://volsync.readthedocs.io/en/stable/usage/triggers.html
          expr: |
            increase(volsync_missed_intervals_total{role="source"}[1h]) > 0
          for: 30m
          labels:
            severity: warning

        - alert: VolsyncOutOfSync
          annotations:
            summary: >-
              Volsync reports
              {{ $labels.obj_namespace }}/{{ $labels.obj_name }} is out of sync.
            description: >-
              The ReplicationSource has fallen out of sync. A warning means a
              single sync was missed; if it persists, inspect the mover pod
              and the Kopia repository connectivity. One-time bootstrap
              destinations are excluded by the `role="source"` filter.
            runbook_url: https://volsync.readthedocs.io/en/stable/usage/triggers.html
          expr: max by (obj_namespace, obj_name) (volsync_volume_out_of_sync{role="source"}) == 1
          for: 1h
          labels:
            severity: warning

        - alert: VolsyncMissingMetrics
          annotations:
            summary: >-
              No volsync metrics scraped from the volsync controller for
              30 minutes.
            description: >-
              Either the volsync controller is down or its ServiceMonitor is
              broken. Backups may be silently failing.
          expr: |
            absent(volsync_volume_out_of_sync) == 1
          for: 30m
          labels:
            severity: critical

        - alert: VolsyncCanaryStale
          annotations:
            summary: >-
              The volsync-canary CronJob has not completed successfully in
              over 36h.
            description: >-
              The volsync-canary daily job verifies that every expected Kopia
              snapshot identity has a recent backup. If the CronJob itself
              stops running, we lose the only end-to-end signal that catches
              silently-stopped ReplicationSources (the failure mode that hid
              the recyclarr/kometa data loss for 9 days).
              Investigate the CronJob in the volsync-system namespace.
          expr: |
            time() - max(kube_cronjob_status_last_successful_time{namespace="volsync-system",cronjob="volsync-canary"}) > 60 * 60 * 36
            or
            absent(kube_cronjob_info{namespace="volsync-system",cronjob="volsync-canary"}) == 1
          for: 1h
          labels:
            severity: warning
