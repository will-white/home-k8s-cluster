apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    kustomize.toolkit.fluxcd.io/prune: disabled
    # smartctl-exporter requires `privileged: true` + hostPath /dev to read
    # SMART data, which `baseline` forbids (CAP_SYS_RAWIO + hostPath). With
    # `enforce: baseline` the daemonset cannot reschedule on new/restarted
    # nodes, leading to KubeDaemonSetNotScheduled / KubeDaemonSetRolloutStuck.
    # Warn/audit stay at `restricted` so any new workload here is still
    # surfaced as a deviation.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: alert-manager
  namespace: observability
spec:
  type: alertmanager
  address: http://alertmanager-operated.observability.svc.cluster.local:9093/api/v2/alerts/
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: alert-manager
  namespace: observability
spec:
  providerRef:
    name: alert-manager
  eventSeverity: error
  eventSources:
    - kind: HelmRelease
      name: "*"
  exclusionList:
    - "error.*lookup github\\.com"
    - "error.*lookup raw\\.githubusercontent\\.com"
    - "dial.*tcp.*timeout"
    - "waiting.*socket"
  suspend: false
