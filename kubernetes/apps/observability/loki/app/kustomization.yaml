apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
configMapGenerator:
  - name: flux-loki-rules
    files:
      - flux.yaml=./resources/flux-lokirule.yaml
    options:
      labels:
        loki_rule: "true"
  - name: loki-recording-rules
    files:
      - recording-rules.yaml=./resources/recording-rules.yaml
    options:
      labels:
        loki_rule: "true"
generatorOptions:
  disableNameSuffixHash: true
