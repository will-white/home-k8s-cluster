---
apiVersion: v1
kind: Service
metadata:
  name: truenas-netdata
  namespace: observability
  labels:
    app.kubernetes.io/name: truenas-netdata
    app.kubernetes.io/instance: truenas
spec:
  clusterIP: None
  ports:
    - name: metrics
      port: 19999
      protocol: TCP
      targetPort: 19999
---
apiVersion: v1
kind: Endpoints
metadata:
  name: truenas-netdata
  namespace: observability
subsets:
  - addresses:
      - ip: ${NAS_IP}
    ports:
      - name: metrics
        port: 19999
        protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: truenas-netdata
  namespace: observability
  labels:
    app.kubernetes.io/name: truenas-netdata
    app.kubernetes.io/instance: truenas
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: node-exporter-truenas
  endpoints:
    - port: metrics
      scheme: http
      path: /api/v1/allmetrics
      params:
        format:
          - prometheus
      interval: 30s
      scrapeTimeout: 30s
