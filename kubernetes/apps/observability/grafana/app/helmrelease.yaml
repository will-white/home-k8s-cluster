---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
spec:
  chart:
    spec:
      chart: grafana
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
      version: 10.5.15
  install:
    remediation:
      retries: 3
  interval: 30m
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
      strategy: rollback
  values:
    admin:
      existingSecret: grafana-admin-secret
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - disableDeletion: false
            editable: true
            folder: Kubernetes
            name: kubernetes
            options:
              path: /var/lib/grafana/dashboards/kubernetes
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: Infrastructure
            name: infrastructure
            options:
              path: /var/lib/grafana/dashboards/infrastructure
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: Networking
            name: networking
            options:
              path: /var/lib/grafana/dashboards/networking
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: External
            name: external
            options:
              path: /var/lib/grafana/dashboards/external
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: Storage
            name: storage
            options:
              path: /var/lib/grafana/dashboards/storage
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: Observability
            name: observability
            options:
              path: /var/lib/grafana/dashboards/observability
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: Home Automation
            name: home-automation
            options:
              path: /var/lib/grafana/dashboards/home-automation
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: Media
            name: media
            options:
              path: /var/lib/grafana/dashboards/media
            orgId: 1
            type: file
          - disableDeletion: false
            editable: true
            folder: Flux
            name: flux
            options:
              path: /var/lib/grafana/dashboards/flux
            orgId: 1
            type: file
    dashboards:
      kubernetes:
        kubernetes-api-server:
          datasource: Prometheus
          # renovate: depName="Kubernetes / System / API Server"
          gnetId: 15761
          revision: 19
        kubernetes-coredns:
          datasource: Prometheus
          # renovate: depName="Kubernetes / System / CoreDNS"
          gnetId: 15762
          revision: 20
        kubernetes-global:
          datasource: Prometheus
          # renovate: depName="Kubernetes / Views / Global"
          gnetId: 15757
          revision: 43
        kubernetes-namespaces:
          datasource: Prometheus
          # renovate: depName="Kubernetes / Views / Namespaces"
          gnetId: 15758
          revision: 42
        kubernetes-nodes:
          datasource: Prometheus
          # renovate: depName="Kubernetes / Views / Nodes"
          gnetId: 15759
          revision: 34
        kubernetes-pods:
          datasource: Prometheus
          # renovate: depName="Kubernetes / Views / Pods"
          gnetId: 15760
          revision: 36
        kubernetes-volumes:
          datasource: Prometheus
          # renovate: depName="K8s / Storage / Volumes / Cluster"
          gnetId: 11454
          revision: 14
        kubernetes-pvc:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
          # renovate: depName="Kubernetes / Persistent Volumes"
          gnetId: 23233
          revision: 6
      infrastructure:
        cert-manager:
          datasource: Prometheus
          # renovate: depName="Cert-manager-Kubernetes"
          gnetId: 20842
          revision: 3
        external-secrets:
          datasource: Prometheus
          url: https://raw.githubusercontent.com/external-secrets/external-secrets/main/docs/snippets/dashboard.json
        node-exporter-full:
          datasource: Prometheus
          # renovate: depName="Node Exporter Full"
          gnetId: 1860
          revision: 37
        smartctl-exporter:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
          # renovate: depName="SMARTctl Exporter Dashboard"
          gnetId: 22604
          revision: 2
        spegel:
          datasource: Prometheus
          # renovate: depName="Spegel"
          gnetId: 18089
          revision: 1
        talos:
          datasource: Prometheus
          # renovate: depName="Talos / Cluster"
          gnetId: 15513
          revision: 3
        volsync:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
            - name: VAR_REPLICATIONDESTNAME
              value: .*-dst
          # renovate: depName="VolSync Dashboard"
          gnetId: 21356
          revision: 3
      networking:
        cloudflared:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
          # renovate: depName="Cloudflare Tunnels (cloudflared)"
          gnetId: 17457
          revision: 6
        external-dns:
          datasource: Prometheus
          # renovate: depName="External-dns"
          gnetId: 15038
          revision: 3
        nginx:
          datasource: Prometheus
          url: https://raw.githubusercontent.com/kubernetes/ingress-nginx/master/deploy/grafana/dashboards/nginx.json
        nginx-ingress:
          datasource: Prometheus
          # renovate: depName="NGINX Ingress controller"
          gnetId: 14314
          revision: 2
        nginx-ingress-loki:
          datasource:
            - name: DS_LOKI
              value: Loki
          # renovate: depName="NGINX / LOKI Ingress Controller"
          gnetId: 12559
          revision: 3
        nginx-request-handling-performance:
          datasource: Prometheus
          url: https://raw.githubusercontent.com/kubernetes/ingress-nginx/master/deploy/grafana/dashboards/request-handling-performance.json
      external:
        adguard-home:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
          # renovate: depName="AdGuard Home Exporter"
          gnetId: 20799
          revision: 8
        apc-ups:
          datasource: Prometheus
          # renovate: depName="APC UPS (SNMP)"
          gnetId: 12340
          revision: 1
        opnsense:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
          # renovate: depName="OPNsense Exporter"
          gnetId: 21113
          revision: 1
        unifi-insights:
          datasource: Prometheus
          # renovate: depName="UniFi-Poller: Client Insights - Prometheus"
          gnetId: 11315
          revision: 9
        unifi-network-sites:
          datasource: Prometheus
          # renovate: depName="UniFi-Poller: Network Sites - Prometheus"
          gnetId: 11311
          revision: 5
        unifi-uap:
          datasource: Prometheus
          # renovate: depName="UniFi-Poller: UAP Insights - Prometheus"
          gnetId: 11314
          revision: 10
        unifi-usw:
          datasource: Prometheus
          # renovate: depName="UniFi-Poller: USW Insights - Prometheus"
          gnetId: 11312
          revision: 9
      storage:
        ceph-cluster:
          datasource: Prometheus
          # renovate: depName="Ceph Cluster"
          gnetId: 2842
          revision: 18
        ceph-osd:
          datasource: Prometheus
          # renovate: depName="Ceph - OSD (Single)"
          gnetId: 5336
          revision: 9
        ceph-pools:
          datasource: Prometheus
          # renovate: depName="Ceph - Pools"
          gnetId: 5342
          revision: 9
        dragonfly:
          datasource: Prometheus
          url: https://raw.githubusercontent.com/dragonflydb/dragonfly/main/tools/local/monitoring/grafana/provisioning/dashboards/dashboard.json
      observability:
        gatus:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
          # renovate: depName="Gatus"
          gnetId: 24379
          revision: 1
        loki-kubernetes-logs:
          datasource: Loki
          # renovate: depName="Kubernetes Service Logs"
          gnetId: 15141
          revision: 1
        loki-stack-monitoring:
          datasource: Prometheus
          # renovate: depName="Loki stack monitoring (Promtail, Loki)"
          gnetId: 14055
          revision: 5
        logs-app:
          datasource:
            - name: DS_LOKI
              value: Loki
          # renovate: depName="Logs / App"
          gnetId: 13639
          revision: 2
        prometheus:
          datasource: Prometheus
          # renovate: depName="Prometheus"
          gnetId: 19105
          revision: 7
      home-automation:
        emqx:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
          # renovate: depName="EMQX"
          gnetId: 17446
          revision: 2
        frigate:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
          # renovate: depName="Frigate Monitoring Dashboard"
          gnetId: 24165
          revision: 1
        home-assistant:
          datasource: Prometheus
          # renovate: depName="Home Assistant"
          gnetId: 15309
          revision: 2
        home-assistant-advanced:
          datasource: Prometheus
          # renovate: depName="Home Assistant Advanced"
          gnetId: 12675
          revision: 3
      media:
        qbittorrent:
          datasource: Prometheus
          # renovate: depName="qBittorrent"
          gnetId: 15080
          revision: 2
        radarr:
          datasource: Prometheus
          # renovate: depName="Radarr v3"
          gnetId: 12896
          revision: 1
        sonarr:
          datasource: Prometheus
          # renovate: depName="Sonarr v3"
          gnetId: 12530
          revision: 2
        unpackerr:
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
          # renovate: depName="Unpackerr"
          gnetId: 18817
          revision: 1
      flux:
        flux-cluster:
          datasource: Prometheus
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/cluster.json
        flux-control-plane:
          datasource: Prometheus
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/control-plane.json
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - access: proxy
            isDefault: true
            name: Prometheus
            type: prometheus
            uid: prometheus
            url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
            jsonData:
              timeInterval: 30s
              queryTimeout: 120s
              httpMethod: POST
              cacheLevel: Medium
          - access: proxy
            name: Loki
            type: loki
            uid: loki
            url: http://loki-headless.observability.svc.cluster.local:3100
            jsonData:
              timeout: 300
              maxLines: 1000
          - access: proxy
            jsonData:
              implementation: prometheus
            name: Alertmanager
            type: alertmanager
            uid: alertmanager
            url: http://alertmanager-operated.observability.svc.cluster.local:9093
        deleteDatasources:
          - name: Alertmanager
            orgId: 1
          - name: Loki
            orgId: 1
          - name: Prometheus
            orgId: 1
    deploymentStrategy:
      type: Recreate
    env:
      GF_DATE_FORMATS_USE_BROWSER_LOCALE: true
      GF_EXPLORE_ENABLED: true
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: natel-discrete-panel,pr0ps-trackmap-panel,panodata-map-panel
      GF_SECURITY_ANGULAR_SUPPORT_ENABLED: true
      GF_SERVER_ROOT_URL: https://grafana.${SECRET_DOMAIN}
    grafana.ini:
      analytics:
        check_for_plugin_updates: false
        check_for_updates: false
        reporting_enabled: false
      auth.anonymous:
        enabled: true
        org_id: 1
        org_name: Main Org.
        org_role: Viewer
      news:
        news_feed_enabled: false
      unified_alerting:
        enabled: true
      alerting:
        enabled: false
      query_history:
        enabled: true
      dataproxy:
        timeout: 300
        keep_alive_seconds: 300
    ingress:
      annotations:
        gethomepage.dev/description: Monitoring Dashboards
        gethomepage.dev/enabled: 'true'
        gethomepage.dev/group: Cluster & Observability
        gethomepage.dev/icon: grafana.png
        gethomepage.dev/name: Grafana
        gethomepage.dev/widget.type: grafana
        gethomepage.dev/widget.url: http://grafana.observability
        gethomepage.dev/widget.username: "{{ `{{HOMEPAGE_VAR_GRAFANA_USERNAME}}` }}"
        gethomepage.dev/widget.password: "{{ `{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}` }}"
      enabled: true
      hosts:
        - "{{ .Release.Name }}.${SECRET_DOMAIN}"
      ingressClassName: internal
    persistence:
      enabled: false
    plugins:
      - grafana-clock-panel
      - grafana-piechart-panel
      - grafana-worldmap-panel
      - natel-discrete-panel
      - pr0ps-trackmap-panel
      - vonage-status-panel
    serviceMonitor:
      enabled: true
    sidecar:
      dashboards:
        enabled: true
        folderAnnotation: grafana_folder
        label: grafana_dashboard
        provider:
          disableDelete: true
          foldersFromFilesStructure: true
        searchNamespace: ALL
      datasources:
        enabled: true
        labelValue: ''
        searchNamespace: ALL
    testFramework:
      enabled: false
