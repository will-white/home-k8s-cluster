apiVersion: v1
kind: Namespace
metadata:
  name: default
  labels:
    kustomize.toolkit.fluxcd.io/prune: disabled
    # PodSecurity admission: enforce is set to "privileged" because
    # home-assistant requires hostNetwork (mDNS/zeroconf device discovery),
    # which "baseline" forbids. HA is the only hostNetwork workload here and
    # is otherwise hardened (runAsNonRoot, drop ALL caps, seccomp
    # RuntimeDefault). warn/audit stay at "restricted" so violations in the
    # other workloads remain visible.
    # TODO: move home-assistant to a dedicated privileged namespace so this
    # shared namespace can return to baseline enforcement.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
