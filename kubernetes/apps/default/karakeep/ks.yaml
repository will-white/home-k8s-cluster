apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app karakeep
  namespace: flux-system
spec:
  targetNamespace: default
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: external-secrets-stores
    - name: volsync
    - name: meilisearch
  path: ./kubernetes/apps/default/karakeep/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: false
  interval: 30m
  timeout: 5m
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_BOOTSTRAP_SOURCE_NAMESPACE: default
      VOLSYNC_CAPACITY: 5Gi
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteMany
      PVC_VOLSYNC_STORAGECLASS: ceph-filesystem
      VOLSYNC_STORAGECLASS: ceph-filesystem
      VOLSYNC_SNAPSHOTCLASS: csi-ceph-filesystem
      VOLSYNC_BOOTSTRAP_TRIGGER: restore-cephfs-2026-05-03
      # Bookmarks change infrequently; daily backup is sufficient.
      VOLSYNC_SCHEDULE: "15 3 * * *"
      # Reduced retention - low priority backup
      VOLSYNC_RETAIN_HOURLY: "6"
      VOLSYNC_RETAIN_DAILY: "3"
      VOLSYNC_RETAIN_WEEKLY: "1"
      VOLSYNC_RETAIN_MONTHLY: "0"
