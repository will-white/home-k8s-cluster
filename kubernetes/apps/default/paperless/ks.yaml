---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app paperless
  namespace: flux-system
spec:
  targetNamespace: default
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  dependsOn:
    - name: dragonfly-cluster
    - name: external-secrets-stores
    - name: volsync
  path: ./kubernetes/apps/default/paperless/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: home-kubernetes
  wait: false
  interval: 30m
  timeout: 5m
  postBuild:
    substitute:
      APP: *app
      VOLSYNC_BOOTSTRAP_SOURCE_NAMESPACE: default
      VOLSYNC_CAPACITY: 10Gi
      VOLSYNC_ACCESSMODES: ReadWriteMany
      VOLSYNC_SNAP_ACCESSMODES: ReadWriteMany
      PVC_VOLSYNC_STORAGECLASS: ceph-filesystem
      VOLSYNC_STORAGECLASS: ceph-filesystem
      VOLSYNC_SNAPSHOTCLASS: csi-ceph-filesystem
      VOLSYNC_BOOTSTRAP_TRIGGER: restore-cephfs-2026-05-03
      # Documents are ingested manually; daily backup is sufficient.
      VOLSYNC_SCHEDULE: "45 3 * * *"
