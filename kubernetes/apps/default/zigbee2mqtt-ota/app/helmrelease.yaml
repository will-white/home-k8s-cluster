---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app zigbee2mqtt-ota
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      zigbee2mqtt-ota:
        type: cronjob
        cronjob:
          # Run weekly on Sundays at 3:00 AM
          schedule: "0 3 * * 0"
          backoffLimit: 0
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
          ttlSecondsAfterFinished: 86400
        containers:
          app:
            image:
              repository: docker.io/library/python
              tag: 3.14-alpine@sha256:dd4d2bd5b53d9b25a51da13addf2be586beebd5387e289e798e4083d94ca837a
            command: ["/bin/sh", "-c"]
            args:
              - >-
                pip install --quiet --no-cache-dir --target /tmp/pylib paho-mqtt && PYTHONPATH=/tmp/pylib python /scripts/ota-update.py
            env:
              TZ: ${TIMEZONE}
              MQTT_HOST: emqx-listeners.database.svc.cluster.local
              MQTT_PORT: "1883"
              Z2M_TOPIC: zigbee2mqtt
              # 3 minutes between device updates
              DELAY_BETWEEN_UPDATES: "180"
              # 1 hour timeout per device
              UPDATE_TIMEOUT: "3600"
              # 60 seconds to collect OTA check responses
              CHECK_WAIT: "60"
              # 15 seconds of MQTT observation to detect concurrent OTA activity
              OTA_OBSERVE_WINDOW: "15"
              # After Z2M reports OTA success, wait this long for the device to
              # republish its state with the new installed_version, then verify.
              VERIFY_DELAY: "30"
              # Persistent self-managed skip list (devices that ACK firmware but
              # never advance installed_version — e.g. Inovelli VZM31-SN 2.x->3.x).
              # Auto-retry triggers if Z2M starts offering a different firmware.
              STATE_FILE: /state/skip.json
              # Hard model skip — applied before any OTA check is sent. Prefer
              # the self-managing skip list over this. Empty disables.
              SKIP_MODELS: ""
              # One-shot bootstrap on the very first run only (skip.json absent):
              # pre-mark every device of these models that currently advertises
              # an update as STUCK on whatever Z2M is offering. Avoids a 10-hour
              # cold-start rediscovering known-broken OTAs. Once skip.json
              # exists, this is ignored. Inovelli VZM31-SN 2.x is the offender
              # in the current cluster — Z2M offers FW 3.04 but devices accept
              # the bytes without ever swapping. Will auto-retry the moment
              # the upstream firmware index advances past 3.04.
              BASELINE_SKIP_MODELS: "VZM31-SN"
              # Set to "true" to only check without applying updates
              DRY_RUN: "false"
              PIP_DISABLE_PIP_VERSION_CHECK: "1"
              PYTHONDONTWRITEBYTECODE: "1"
              PYTHONUNBUFFERED: "1"
            envFrom:
              - secretRef:
                  name: zigbee2mqtt-ota-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
        pod:
          restartPolicy: Never
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    persistence:
      scripts:
        type: configMap
        name: zigbee2mqtt-ota-scripts
        globalMounts:
          - path: /scripts/ota-update.py
            subPath: ota-update.py
            readOnly: true
      state:
        type: persistentVolumeClaim
        existingClaim: zigbee2mqtt-ota-state
        globalMounts:
          - path: /state
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
  driftDetection:
    mode: enabled
