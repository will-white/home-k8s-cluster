---
# yaml-language-server: $schema=https://raw.githubusercontent.com/rancher/system-upgrade-controller/master/pkg/apis/upgrade.cattle.io/v1/plan.json
apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: talos-controlplane
  namespace: system-upgrade
spec:
  # Wait for worker Plan to complete before starting
  version: v1.12.1
  serviceAccountName: system-upgrade
  concurrency: 1
  exclusive: true
  nodeSelector:
    matchLabels:
      node-role.kubernetes.io/control-plane: ""
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
  upgrade:
    image: factory.talos.dev/installer/4ac502d0fe0dcee313870d79c8005e6b99ac55872533f873c704080f035dc6e8:v1.12.1
  drain:
    force: false
    disableEviction: false
    deleteLocalData: true
    ignoreDaemonSets: true
    skipWaitForDeleteTimeout: 180
    timeout: 900
    gracePeriod: 1200
