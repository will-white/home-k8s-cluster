apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app qbittorrent
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 1h
  # Longer timeout: gluetun must establish the VPN tunnel before qBittorrent's
  # WebUI (and thus the readiness probe) can pass.
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    # No rollback: a failed upgrade must NOT revert to the previous (leaky)
    # release. Leave the new pod in place so its logs are observable.
    remediation:
      retries: 0
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      qbittorrent:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.2.1@sha256:8d58d9ad18a1fb5e556e68bde7ac06046847cc97069257f01d2e1ec0d27ff019
            env:
              PUID: 1000
              PGID: 1000
              TZ: ${TIMEZONE}
              QBT_WEBUI_PORT: &port 80
              QBT_TORRENTING_PORT: 50413
            #   CROSS_SEED_ENABLED: false
            #   CROSS_SEED_HOST: cross-seed.default.svc.cluster.local
            #   CROSS_SEED_PORT: 80
            #   CROSS_SEED_SLEEP_INTERVAL: 0
            #   PUSHOVER_ENABLED: true
            envFrom:
              - secretRef:
                  name: qbittorrent-secret
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 100m
          exporter:
            image:
              repository: ghcr.io/esanchezm/prometheus-qbittorrent-exporter
              tag: v1.7.0@sha256:02dbf86bd2850dcb94e7df5684159b954386e978e20f6b473f92efa62335f552
            env:
              QBITTORRENT_PORT: &port 80
              QBITTORRENT_HOST: localhost
              EXPORTER_PORT: &metricsPort 9707
            envFrom:
              - secretRef:
                  name: qbittorrent-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 128Mi
          # VPN sidecar: all pod traffic egresses through PIA WireGuard with a
          # kill switch. If the tunnel drops, gluetun's firewall blocks egress so
          # the real IP cannot leak (TCP *and* UDP). qBittorrent's own SOCKS5 proxy
          # must be turned OFF in the WebUI once this is live.
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
            env:
              VPN_SERVICE_PROVIDER: private internet access
              # gluetun does NOT support PIA over WireGuard — only OpenVPN. PIA
              # OpenVPN uses the same OPENVPN_USER/OPENVPN_PASSWORD account creds.
              VPN_TYPE: openvpn
              OPENVPN_PROTOCOL: udp
              # Change region as desired. NOTE: PIA US regions do NOT support port
              # forwarding — to enable it below, switch to a PF-capable region
              # (e.g. "CA Toronto", "Netherlands").
              SERVER_REGIONS: "US Denver"
              VPN_PORT_FORWARDING: "off"
              # Open the WebUI (80) and metrics (9707) ports through the kill-switch
              # firewall so the Service/probes can still reach the pod.
              FIREWALL_INPUT_PORTS: "80,9707"
              # Allow direct (non-VPN) access to in-cluster + LAN ranges so DNS,
              # the Service, kubelet probes, and the NFS server keep working.
              FIREWALL_OUTBOUND_SUBNETS: "10.69.0.0/16,10.96.0.0/16,192.168.5.0/24"
              # DNS left at gluetun default (DNS-over-TLS through the tunnel) to
              # avoid DNS leaks.
              UPDATER_PERIOD: 24h
              TZ: ${TIMEZONE}
            # OPENVPN_USER / OPENVPN_PASSWORD (PIA account creds) come from the
            # SOPS-encrypted secret.sops.yaml in this directory.
            envFrom:
              - secretRef:
                  name: qbittorrent-vpn-secret
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              capabilities:
                add: ["NET_ADMIN"]
                drop: ["ALL"]
            resources:
              requests:
                cpu: 25m
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: qbittorrent
        # ClusterIP: WebUI is served via the ingress below, and incoming peer
        # connections now arrive through the VPN tunnel — not a LAN LoadBalancer
        # port — so the direct bittorrent port and static LB IP are dropped.
        type: ClusterIP
        ports:
          http:
            port: *port
          metrics:
            port: *metricsPort
    ingress:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Downloads
          gethomepage.dev/name: qBittorrent
          gethomepage.dev/icon: qbittorrent.png
          gethomepage.dev/description: Torrent Client
          gethomepage.dev/widget.type: qbittorrent
          gethomepage.dev/widget.url: http://qbittorrent.media
          gethomepage.dev/widget.username: "{{ `{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}` }}"
          gethomepage.dev/widget.password: "{{ `{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}` }}"
        className: internal
        hosts:
          - host: torrents.${SECRET_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    serviceMonitor:
      app:
        serviceName: qbittorrent
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 30s
    persistence:
      config:
        existingClaim: *app
      tmp:
        type: emptyDir
      scripts:
        type: configMap
        name: qbittorrent-scripts
        defaultMode: 0775
        globalMounts:
          - readOnly: true
      media:
        type: nfs
        server: ${NAS_IP}
        path: /mnt/main/media
        globalMounts:
          - path: /Downloads
            subPath: Downloads
  driftDetection:
    mode: enabled
