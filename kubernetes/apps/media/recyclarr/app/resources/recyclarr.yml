###
# Recyclarr guide: https://recyclarr.dev/wiki/guide-configs/
###
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/recyclarr/recyclarr/master/schemas/config-schema.json
#
# Profile naming convention (must match the profile names in Sonarr/Radarr UI):
#   HD             - Default. WEB 720p floor, Remux-1080p cutoff. End-user friendly.
#   4K             - Opt-in. WEB 1080p floor, Bluray-2160p cutoff. For 4K TVs.
#   Anime          - Auto-applied via Seerr rule. WEB 720p floor, Remux-1080p cutoff.
#   Best Available - Escape hatch for obscure films. SDTV floor, Remux-2160p cutoff.
#
# Recyclarr only manages custom format definitions and per-profile CF scores.
# Profile structure (qualities allowed, cutoff, upgrade settings) is managed in the UI.
# The TRaSH `quality-profile` templates are intentionally NOT included here so Recyclarr
# will not recreate the old-named profiles ("WEB-1080p", "UHD Bluray + WEB", etc.).

sonarr:
  sonarr_main:
    base_url: http://sonarr.media.svc.cluster.local
    api_key: !env_var SONARR_API_KEY

    delete_old_custom_formats: true

    include:
      - template: sonarr-quality-definition-series
      - template: sonarr-v4-custom-formats-web-1080p
      - template: sonarr-v4-custom-formats-web-2160p
      - template: sonarr-quality-definition-anime
      - template: sonarr-v4-custom-formats-anime

    custom_formats:
##################  HD / 4K / Best Available — shared  ##################
      # Junk blockers (TRaSH-default negative scores; reject bad releases but DO NOT
      # prevent legitimate lower-quality fallback grabs).
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
          - 1b3994c551cbb92a2c781af061f4ab44 # Scene
          - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ (low-quality release groups)
          - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK (raw Blu-ray disc dumps)
        assign_scores_to:
          - name: HD
          - name: 4K
          - name: Best Available

      # Prefer season packs over single-episode grabs (TRaSH default +10).
      - trash_ids:
          - 3bc5f395426614e155e585a2f056cdf1 # Season Pack
        assign_scores_to:
          - name: HD
          - name: 4K
          - name: Best Available

##################  4K / Best Available — only  ##################
      - trash_ids:
          # Comment out the next line if you and all of your users' setups are fully DV compatible
          - 9b27ab6498ec0f31a3353992e19434ca # DV (WEBDL)

          # HDR10+ Boost (purely additive; boosts HDR10+ releases, no impact on non-HDR clients).
          - 0dad0a507451acddd754fe6dc3a7f5e7 # HDR10+ Boost
          - 385e9e8581d33133c3961bdcdeffb7b4 # DV HDR10+ Boost
        assign_scores_to:
          - name: 4K
          - name: Best Available

      # SDR (no WEBDL): keeps SDR WEB available as fallback for non-HDR clients,
      # while blocking bloated SDR Remux/Bluray files.
      - trash_ids:
          - 83304f261cf516bb208c18c54c0adf97 # SDR (no WEBDL)
        assign_scores_to:
          - name: 4K
          - name: Best Available

##################  Anime  ##################
      - trash_ids:
          - 026d5aadd1a6b4e550b134cb6c72b3ca # Uncensored
        assign_scores_to:
          - name: Anime
            score: 0 # Adjust scoring as desired
      - trash_ids:
          - b2550eb333d27b75833e25b8c2557b38 # 10bit
        assign_scores_to:
          - name: Anime
            score: 0 # Adjust scoring as desired
      - trash_ids:
          - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
        assign_scores_to:
          - name: Anime
            score: 0 # Adjust scoring as desired

      # Junk blockers for Anime profile.
      - trash_ids:
          - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
          - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
          - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
          - 06d66ab109d4d2eddb2794d21526d140 # Retags
          - 1b3994c551cbb92a2c781af061f4ab44 # Scene
          - 9c11cd3f07101cdba90a2d81cf0e56b4 # LQ
          - 85c61753df5da1fb2aab6f2a47426b09 # BR-DISK
        assign_scores_to:
          - name: Anime

radarr:
  radarr_main:
    base_url: http://radarr.media.svc.cluster.local
    api_key: !env_var RADARR_API_KEY

    delete_old_custom_formats: true

    include:
      - template: radarr-quality-definition-movie
      # UHD CF set is the most comprehensive 4K-tier definition pack.
      - template: radarr-custom-formats-uhd-bluray-web
      # 1080p CF set covers HD-tier formats.
      - template: radarr-custom-formats-remux-web-1080p
      - template: radarr-custom-formats-anime

    custom_formats:
##################  HD / 4K / Best Available — shared  ##################
      # Audio (TRaSH default scores; positive/additive — boost preferred audio formats
      # without blocking releases that only have basic audio. Lossy formats keep low
      # positive scores so they remain valid fallback grabs.)
      - trash_ids:
          - 496f355514737f7d83bf7aa4d24f8169 # TrueHD Atmos
          - 2f22d89048b01681dde8afe203bf2e95 # DTS X
          - 417804f7f2c4308c1f4c5d380d4c4475 # ATMOS (undefined)
          - 1af239278386be2919e1bcee0bde047e # DD+ ATMOS
          - 3cafb66171b47f226146a0770576870f # TrueHD
          - dcf3ec6938fa32445f590a4da84256cd # DTS-HD MA
          - a570d4a0e56a2874b64e5bfa55202a1b # FLAC
          - e7c2fcae07cbada050a0af3357491d7b # PCM
          - 8e109e50e0a0b83a5098b056e13bf6db # DTS-HD HRA
          - 185f1dd7264c4562b9022d963ac37424 # DD+
          - f9f847ac70a0af62ea4a08280b859636 # DTS-ES
          - 1c1a4c5e823891c75bc50380a6866f73 # DTS
          - 240770601cc226190c367ef59aba7463 # AAC
          - c2998bd0d90ed5621d8df281e839436e # DD
        assign_scores_to:
          - name: HD
          - name: 4K
          - name: Best Available

      # Movie versions — Remaster boost (additive).
      - trash_ids:
          - 570bc9ebecd92723d2d21500f4be314c # Remaster
        assign_scores_to:
          - name: HD
          - name: 4K
          - name: Best Available

      # Junk blockers (TRaSH-default negative scores).
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          # - cc444569854e9de0b084ab2b8b1532b2 # Black and White Editions
          - 90cedc1fea7ea5d11298bebd3d1d3223 # EVO (no WEBDL)
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
          - f537cf427b64c38c8e36298f657e4828 # Scene
          - 90a6f9a284dff5103f6346090e6280c8 # LQ
          - ed38b889b31be83fda192888e2286d83 # BR-DISK
        assign_scores_to:
          - name: HD
          - name: 4K
          - name: Best Available

##################  4K / Best Available — only  ##################
      # 4K-specific movie versions.
      - trash_ids:
          - eca37840c13c6ef2dd0262b141a5482f # 4K Remaster
          - 957d0f44b592285f26449575e8b1167e # Special Edition
        assign_scores_to:
          - name: 4K
          - name: Best Available

      - trash_ids:
          # Comment out the next line if you and all of your users' setups are fully DV compatible
          - 923b6abef9b17f937fab56cfcf89e1f1 # DV (WEBDL)

          # HDR10+ Boost (purely additive; boosts HDR10+ releases, no impact on non-HDR clients).
          - b17886cb4158d9fea189859409975758 # HDR10Plus Boost
          - 55a5b50cb416dea5a50c4955896217ab # DV HDR10+ Boost
        assign_scores_to:
          - name: 4K
          - name: Best Available

      # SDR (no WEBDL): keeps SDR WEB available as fallback for non-HDR clients,
      # while blocking bloated SDR Remux/Bluray files.
      - trash_ids:
          - 25c12f78430a3a23413652cbd1d48d77 # SDR (no WEBDL)
        assign_scores_to:
          - name: 4K
          - name: Best Available

##################  Anime  ##################
      - trash_ids:
          - 064af5f084a0a24458cc8ecd3220f93f # Uncensored
        assign_scores_to:
          - name: Anime
            score: 500 # Adjust scoring as desired

      - trash_ids:
          - a5d148168c4506b55cf53984107c396e # 10bit
        assign_scores_to:
          - name: Anime
            score: 500 # Adjust scoring as desired

      - trash_ids:
          - 4a3b087eea2ce012fcc1ce319259a3be # Anime Dual Audio
        assign_scores_to:
          - name: Anime
            score: 500 # Adjust scoring as desired

      # Junk blockers for Anime profile.
      - trash_ids:
          - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
          - 90cedc1fea7ea5d11298bebd3d1d3223 # EVO (no WEBDL)
          - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
          - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
          - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
          - f537cf427b64c38c8e36298f657e4828 # Scene
          - 90a6f9a284dff5103f6346090e6280c8 # LQ
          - ed38b889b31be83fda192888e2286d83 # BR-DISK
        assign_scores_to:
          - name: Anime
