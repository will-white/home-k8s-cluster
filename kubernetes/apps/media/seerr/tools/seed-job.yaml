---
apiVersion: batch/v1
kind: Job
metadata:
  name: seerr-seed-config
  namespace: media
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: seed-config
          image: docker.io/library/alpine:3.21.3
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              if [ -f /target/db/db.sqlite3 ]; then
                echo "Target Seerr PVC already contains a database; refusing to overwrite."
                exit 1
              fi
              cp -a /source/. /target/
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: overseerr
              mountPath: /source
              readOnly: true
            - name: seerr
              mountPath: /target
      volumes:
        - name: overseerr
          persistentVolumeClaim:
            claimName: overseerr
            readOnly: true
        - name: seerr
          persistentVolumeClaim:
            claimName: seerr
