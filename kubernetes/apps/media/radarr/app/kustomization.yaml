apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./pvc.yaml
  - ./helmrelease.yaml
  - ./gatus.yaml
configMapGenerator:
  - name: radarr-configmap
    files:
      - pushover-notifier.sh=./resources/pushover-notifier.sh
  - name: radarr-loki-rules
    files:
      - radarr.yaml=./resources/lokirule.yaml
    options:
      labels:
        loki_rule: "true"
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
