---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: bazarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secrets-manager
  target:
    name: bazarr-secret
    template:
      engineVersion: v2
      data:
        BAZARR__AUTH__APIKEY: "{{ .BAZARR_API_KEY }}"
        PLEX_TOKEN: "{{ .PLEX_TOKEN }}"
        # Bazarr native Postgres support (v1.4+) via env-var overrides
        POSTGRES_ENABLED: "True"
        POSTGRES_HOST: &dbHost postgres16-rw.database.svc.cluster.local
        POSTGRES_PORT: "5432"
        POSTGRES_DATABASE: &dbName bazarr
        POSTGRES_USERNAME: &dbUser "{{ .BAZARR_POSTGRES_USER }}"
        POSTGRES_PASSWORD: &dbPass "{{ .BAZARR_POSTGRES_PASSWORD }}"
        # postgres-init initContainer creates the role/db on demand
        INIT_POSTGRES_HOST: *dbHost
        INIT_POSTGRES_DBNAME: *dbName
        INIT_POSTGRES_USER: *dbUser
        INIT_POSTGRES_PASS: *dbPass
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPERUSER_PASSWORD }}"
  dataFrom:
    - extract:
        key: bazarr
    - extract:
        key: plex
    - extract:
        key: POSTGRES
