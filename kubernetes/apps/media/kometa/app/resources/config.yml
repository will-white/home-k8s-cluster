## Kometa Configuration
## https://kometa.wiki/en/latest/config/configuration/

plex:
  url: http://plex.internal
  token: <<env.KOMETA_PLEX_TOKEN>>
  timeout: 60
  db_cache: 40

trakt:
  client_id: <<env.KOMETA_TRAKT_CLIENT_ID>>
  client_secret: <<env.KOMETA_TRAKT_CLIENT_SECRET>>
  authorization:
    access_token: <<env.KOMETA_TRAKT_ACCESS_TOKEN>>
    token_type: Bearer
    expires_in: 604800
    refresh_token: <<env.KOMETA_TRAKT_REFRESH_TOKEN>>
    scope: public
    created_at: <<env.KOMETA_TRAKT_CREATED_AT>>

settings:
  cache: true
  cache_expiration: 60
  asset_directory:
    - config/assets
  create_asset_folders: false
  sync_mode: sync
  minimum_items: 1
  playlist_sync_to_users: all
  playlist_report: false
  verify_ssl: true

libraries:
  # Required section - leave empty if only using playlists
  # Add library names matching your Plex libraries to manage collections

playlists:
  # "Recently Added Movies" - movies added in the last 30 days, newest first
  Recently Added Movies:
    sync_to_users: all
    plex_search:
      all:
        added: 30d
      sort_by: added.desc
      limit: 50

  # "Recently Added Shows" - TV episodes added in the last 30 days
  Recently Added Shows:
    sync_to_users: all
    plex_search:
      all:
        added: 30d
        type: show
      sort_by: added.desc
      limit: 50

  # Add additional playlists below following the same pattern

  One Piece Canon:
    sync_to_users: all
    trakt_list: https://trakt.tv/users/heyitsbea/lists/one-piece-canon-updated-8-2025
