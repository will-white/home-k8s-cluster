apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app suwayomi
spec:
  interval: 30m
  chart:
    spec:
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
  values:
    controllers:
      suwayomi:
        containers:
          app:
            image:
              repository: ghcr.io/suwayomi/suwayomi-server
              tag: stable@sha256:5ede4623f7569ce16951f9682191afd5f63b7b76e2be9eec2f0f3548eb018cad
            env:
              TZ: ${TIMEZONE}
              AUTH_MODE: none
              DOWNLOAD_AS_CBZ: "true"
              # Auto-download new chapters as soon as the global update finds them
              AUTO_DOWNLOAD_CHAPTERS: "true"
              # Default true skips auto-download for entries that still have unread
              # chapters -> the reason new chapters were not being grabbed
              AUTO_DOWNLOAD_EXCLUDE_UNREAD: "false"
              # No cap on how many unread downloaded chapters may pile up
              AUTO_DOWNLOAD_NEW_CHAPTERS_LIMIT: "0"
              # Check sources every 6h (minimum allowed) instead of 12h
              UPDATE_INTERVAL: "6"
              # Do not exclude manga from the global update based on read state;
              # otherwise unread/unstarted/completed series are never checked, so
              # their new chapters are never found and thus never auto-downloaded
              UPDATE_EXCLUDE_UNREAD: "false"
              UPDATE_EXCLUDE_STARTED: "false"
              UPDATE_EXCLUDE_COMPLETED: "false"
              # Refresh each entry's own metadata (status/cover/description)
              # during the global update, not just its chapter list
              UPDATE_MANGA_INFO: "true"
              DOWNLOADS_PATH: /media/manga
              # Route Cloudflare-challenged sources through the in-cluster
              # FlareSolverr (byparr) instance; only invoked when a source
              # actually returns a challenge, so otherwise a no-op
              FLARESOLVERR_ENABLED: "true"
              FLARESOLVERR_URL: http://flaresolverr.media.svc.cluster.local:8191
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            securityContext:
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 2Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        controller: suwayomi
        ports:
          http:
            port: 4567
    ingress:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Media
          gethomepage.dev/name: Suwayomi
          gethomepage.dev/icon: suwayomi.png
          gethomepage.dev/description: Manga Downloads
        className: internal
        hosts:
          - host: "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
    persistence:
      config:
        existingClaim: *app
        globalMounts:
          - path: /home/suwayomi/.local/share/Tachidesk
      media:
        type: nfs
        server: ${NAS_IP}
        path: /mnt/main/media
        globalMounts:
          - path: /media
  driftDetection:
    mode: enabled
