apiVersion: v1
kind: Namespace
metadata:
  name: media
  labels:
    kustomize.toolkit.fluxcd.io/prune: disabled
    # PodSecurity admission: enforce privileged because the qbittorrent pod runs
    # a gluetun VPN sidecar that needs the NET_ADMIN capability (blocked by both
    # baseline and restricted). warn/audit stay at restricted so violations in
    # other media apps still surface.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
